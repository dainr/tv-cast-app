<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Display Receiver</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>

  <style>
    /* Premium modern dark UI */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body, html {
      width: 100%;
      height: 100%;
      background-color: #0b0c10;
      color: #c5c6c7;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      overflow: hidden;
    }

    #display-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #video-player {
      width: 100%;
      height: 100%;
      background-color: #000;
      display: none;
    }

    /* Idle / Waiting Screen */
    #idle-screen {
      text-align: center;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.5s ease;
    }

    .glow-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, #66fcf1 0%, rgba(102, 252, 241, 0.1) 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
      box-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
      animation: pulse 2s infinite ease-in-out;
    }

    .glow-circle svg {
      width: 50px;
      height: 50px;
      fill: #1f2833;
    }

    h1 {
      font-size: 2.5rem;
      color: #ffffff;
      margin-bottom: 15px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    p {
      font-size: 1.2rem;
      color: #66fcf1;
      margin-bottom: 25px;
    }

    .instructions {
      background-color: #1f2833;
      padding: 15px 30px;
      border-radius: 30px;
      border: 1px solid #45a29e;
      font-size: 1rem;
      color: #c5c6c7;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    /* Notifications / Toast info */
    #toast {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(31, 40, 51, 0.9);
      color: #66fcf1;
      padding: 12px 24px;
      border-radius: 8px;
      border-left: 4px solid #66fcf1;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 100;
      pointer-events: none;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 15px rgba(102, 252, 241, 0.3); }
      50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(102, 252, 241, 0.6); }
      100% { transform: scale(0.95); box-shadow: 0 0 15px rgba(102, 252, 241, 0.3); }
    }

    /* Sidebar and Queue UI */
    #menu-btn {
      position: absolute;
      top: 25px;
      left: 25px;
      background: rgba(31, 40, 51, 0.8);
      border: 1px solid rgba(102, 252, 241, 0.4);
      color: #66fcf1;
      padding: 12px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 200;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, transform 0.2s;
    }

    #menu-btn:hover {
      background: #1f2833;
      transform: scale(1.1);
      box-shadow: 0 0 12px rgba(102, 252, 241, 0.6);
    }

    #menu-btn svg {
      width: 24px;
      height: 24px;
      fill: #66fcf1;
    }

    #queue-sidebar {
      position: absolute;
      top: 0;
      left: 0;
      width: 340px;
      height: 100%;
      background: rgba(11, 12, 16, 0.95);
      border-right: 1px solid rgba(102, 252, 241, 0.2);
      z-index: 190;
      padding: 90px 20px 20px 20px;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
      box-shadow: 5px 0 25px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    #queue-sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      font-size: 1.3rem;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(102, 252, 241, 0.2);
      padding-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header span {
      color: #66fcf1;
      font-size: 0.85rem;
    }

    #queue-list {
      flex-grow: 1;
      overflow-y: auto;
      list-style: none;
      padding-right: 5px;
    }

    /* Scrollbar */
    #queue-list::-webkit-scrollbar {
      width: 5px;
    }
    #queue-list::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.1);
    }
    #queue-list::-webkit-scrollbar-thumb {
      background: #45a29e;
      border-radius: 5px;
    }

    .queue-item {
      background: rgba(31, 40, 51, 0.5);
      border: 1px solid rgba(197, 198, 199, 0.1);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.2s, border-color 0.2s;
    }

    .queue-item:hover {
      background: rgba(31, 40, 51, 0.9);
      border-color: rgba(102, 252, 241, 0.3);
    }

    .queue-item-title {
      font-size: 0.9rem;
      color: #c5c6c7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 170px;
    }

    .queue-item-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .queue-item:hover .queue-item-actions {
      opacity: 1;
    }

    .action-btn {
      background: none;
      border: none;
      color: #8f9aa6;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .action-btn:hover {
      color: #66fcf1;
      background: rgba(102, 252, 241, 0.1);
    }

    .action-btn.delete:hover {
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.1);
    }

    /* Skip button at bottom of sidebar */
    .skip-btn {
      margin-top: 15px;
      padding: 12px;
      background: #45a29e;
      color: #0b0c10;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .skip-btn:hover {
      background: #66fcf1;
      transform: translateY(-1px);
    }

    .queue-item.drag-over {
      border: 1px dashed #66fcf1;
      background: rgba(102, 252, 241, 0.15) !important;
    }
  </style>
</head>
<body>

  <div id="display-container">
    <!-- Menu Button (Top Left Hamburger) -->
    <button id="menu-btn" onclick="toggleSidebar()" title="Toggle Playlist Queue">
      <svg viewBox="0 0 24 24">
        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
      </svg>
    </button>

    <!-- Queue Sidebar -->
    <div id="queue-sidebar">
      <div class="sidebar-header">
        Play Queue <span id="queue-count">0/15</span>
      </div>
      <ul id="queue-list">
        <!-- Rendered dynamically -->
      </ul>
      <button class="skip-btn" id="skip-button" onclick="skipToNext()">
        Skip to Next ➔
      </button>
    </div>

    <video id="video-player" controls autoplay muted playsinline preload="auto" name="media"></video>
    <iframe id="web-frame" style="position:absolute; top:0; left:0; width:100%; height:100%; border:none; display:none; background:#000;" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>

    <div id="idle-screen">
      <div class="glow-circle">
        <svg viewBox="0 0 24 24">
          <path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12zM21 6H3v10h18V6z"/>
        </svg>
      </div>
      <h1>TV CAST RECEIVER</h1>
      <p id="server-url">Waiting for connection...</p>
      <div class="instructions">
        Open the controller on a mobile phone or tablet to start casting:<br>
        <span style="color: #66fcf1; font-weight: bold; font-size: 1.15rem; margin-top: 8px; display: inline-block; word-break: break-all;" id="controller-link"></span>
      </div>
    </div>

    <div id="toast">Casting stream...</div>
  </div>  <script>
    var video = document.getElementById('video-player');
    var webFrame = document.getElementById('web-frame');
    var idleScreen = document.getElementById('idle-screen');
    var toast = document.getElementById('toast');
    var serverUrlDisplay = document.getElementById('server-url');
    
    // Sidebar DOM elements
    var sidebar = document.getElementById('queue-sidebar');
    var queueList = document.getElementById('queue-list');
    var queueCount = document.getElementById('queue-count');
    
    var localQueue = [];

    // Display the current URL
    serverUrlDisplay.innerText = "Host IP / Server: " + window.location.host;

    // Set the controller link
    var origin = window.location.origin || (window.location.protocol + "//" + window.location.host);
    document.getElementById('controller-link').innerText = origin + "/controller";

    var lastTimestamp = 0;

    // Show a small toast notification
    function showToast(text) {
      toast.innerText = text;
      toast.style.opacity = '1';
      setTimeout(function() {
        toast.style.opacity = '0';
      }, 3000);
    }

    // Traditional ES5 callback AJAX helper to replace modern fetch/Promise APIs
    function makeRequest(method, url, data, callback) {
      var xhr = new XMLHttpRequest();
      xhr.open(method, url, true);
      if (method === 'POST') {
        xhr.setRequestHeader('Content-Type', 'application/json');
      }
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              var res = JSON.parse(xhr.responseText);
              callback(null, res);
            } catch(e) {
              callback(null, xhr.responseText);
            }
          } else {
            callback(new Error("Status: " + xhr.status), null);
          }
        }
      };
      xhr.onerror = function() {
        callback(new Error("Network Error"), null);
      };
      xhr.send(data ? JSON.stringify(data) : null);
    }

    // Polling function designed to work on all TV browsers (including legacy ones lacking WebSockets/SSE)
    function checkState() {
      makeRequest('GET', '/api/state', null, function(err, data) {
        if (err) {
          console.error('Error checking state:', err);
          return;
        }
        
        // Render updated queue
        renderQueue(data.queue);
        
        if (data.url && data.timestamp > lastTimestamp) {
          lastTimestamp = data.timestamp;
          playMedia(data.url);
        }
      });
    }

    // Sidebar interaction functions
    function toggleSidebar() {
      sidebar.classList.toggle('open');
    }

    function skipToNext() {
      showToast("Loading next video...");
      makeRequest('POST', '/api/next', null, function(err, data) {
        if (!err && data && data.success) {
          lastTimestamp = data.state.timestamp;
          if (data.state.url) {
            playMedia(data.state.url);
          } else {
            resetToIdle();
          }
        } else {
          console.error("Failed to skip to next:", err);
        }
      });
    }

    function resetToIdle() {
      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
      }
      video.style.display = 'none';
      webFrame.style.display = 'none';
      webFrame.src = 'about:blank';
      video.src = '';
      idleScreen.style.display = 'flex';
      showToast("Queue finished. Idle.");
    }

    function deleteQueueItem(itemId) {
      makeRequest('POST', '/api/queue/delete', { id: itemId }, function(err, data) {
        if (!err && data && data.success) {
          renderQueue(data.state.queue);
        } else {
          console.error("Failed to delete queue item:", err);
        }
      });
    }

    // Updates state order on server
    function sendReorder(ids) {
      makeRequest('POST', '/api/queue/reorder', { ids: ids }, function(err, data) {
        if (!err && data && data.success) {
          renderQueue(data.state.queue);
        } else {
          console.error("Failed to reorder queue:", err);
        }
      });
    }

    function moveQueueItem(index, direction) {
      var targetIndex = index + direction;
      if (targetIndex < 0 || targetIndex >= localQueue.length) return;
      
      // Swap elements locally for immediate response
      var temp = localQueue[index];
      localQueue[index] = localQueue[targetIndex];
      localQueue[targetIndex] = temp;
      
      var ids = localQueue.map(function(item) { return item.id; });
      sendReorder(ids);
    }

    function renderQueue(queue) {
      localQueue = queue || [];
      queueCount.innerText = localQueue.length + "/15";
      queueList.innerHTML = "";
      
      if (localQueue.length === 0) {
        queueList.innerHTML = '<li style="text-align:center; padding: 25px; color:#8f9aa6; font-style:italic; font-size:0.9rem;">Queue is empty</li>';
        return;
      }
      
      localQueue.forEach(function(item, index) {
        var li = document.createElement('li');
        li.className = 'queue-item';
        
        // Drag and drop event listeners
        li.draggable = true;
        
        li.ondragstart = function(e) {
          e.dataTransfer.setData('text/plain', index);
          li.style.opacity = '0.4';
        };
        
        li.ondragend = function(e) {
          li.style.opacity = '1';
          var items = queueList.querySelectorAll('.queue-item');
          for (var i = 0; i < items.length; i++) {
            items[i].classList.remove('drag-over');
          }
        };
        
        li.ondragover = function(e) {
          e.preventDefault();
          li.classList.add('drag-over');
        };
        
        li.ondragleave = function(e) {
          li.classList.remove('drag-over');
        };
        
        li.ondrop = function(e) {
          e.preventDefault();
          li.classList.remove('drag-over');
          var fromIndex = parseInt(e.dataTransfer.getData('text/plain'), 10);
          if (isNaN(fromIndex) || fromIndex === index) return;
          
          var movedItem = localQueue.splice(fromIndex, 1)[0];
          localQueue.splice(index, 0, movedItem);
          
          var ids = localQueue.map(function(item) { return item.id; });
          sendReorder(ids);
        };
        
        var titleDiv = document.createElement('div');
        titleDiv.className = 'queue-item-title';
        titleDiv.innerText = (index + 1) + ". " + (item.title || 'Cast Video');
        titleDiv.title = item.title;
        li.appendChild(titleDiv);
        
        var actionsDiv = document.createElement('div');
        actionsDiv.className = 'queue-item-actions';
        
        // Move Up Button
        if (index > 0) {
          var upBtn = document.createElement('button');
          upBtn.className = 'action-btn';
          upBtn.innerHTML = '▲';
          upBtn.title = "Move Up";
          upBtn.onclick = function(e) {
            e.stopPropagation();
            moveQueueItem(index, -1);
          };
          actionsDiv.appendChild(upBtn);
        }
        
        // Move Down Button
        if (index < localQueue.length - 1) {
          var downBtn = document.createElement('button');
          downBtn.className = 'action-btn';
          downBtn.innerHTML = '▼';
          downBtn.title = "Move Down";
          downBtn.onclick = function(e) {
            e.stopPropagation();
            moveQueueItem(index, 1);
          };
          actionsDiv.appendChild(downBtn);
        }
        
        // Delete Button
        var delBtn = document.createElement('button');
        delBtn.className = 'action-btn delete';
        delBtn.innerHTML = '🗑️';
        delBtn.title = "Delete";
        delBtn.onclick = function(e) {
          e.stopPropagation();
          deleteQueueItem(item.id);
        };
        actionsDiv.appendChild(delBtn);
        
        li.appendChild(actionsDiv);
        li.onclick = function(e) {
          // Double-click or click item to force play it immediately
          e.stopPropagation();
          if (confirm("Play this item immediately?")) {
            playMediaImmediately(item);
          }
        };
        
        queueList.appendChild(li);
      });
    }

    function playMediaImmediately(item) {
      makeRequest('POST', '/api/play', { url: item.url, title: item.title, force: true }, function(err, data) {
        if (!err && data && data.success) {
          // Remove from queue
          deleteQueueItem(item.id);
        } else {
          console.error("Failed to play enqueued item:", err);
        }
      });
    }

    // Start playing the casted media
    var hlsInstance = null;
    var currentRawUrl = "";
    var isProxyActive = false;

    // Error listener for fallback loading
    video.onerror = function() {
      if (video.src && !isProxyActive && currentRawUrl && currentRawUrl.indexOf('http') === 0) {
        console.log("Direct playback failed. Retrying via CORS bypass proxy...");
        showToast("Direct load failed. Retrying with CORS bypass proxy...");
        playMediaWithConfig(currentRawUrl, true);
      } else if (currentRawUrl && currentRawUrl.indexOf('http') === 0) {
        // If direct stream fails completely, load the webpage itself in a full-screen iframe!
        console.log("Direct video play failed. Falling back to embedded web page iframe...");
        showToast("Playback failed. Rendering webpage in full screen...");
        
        if (hlsInstance) {
          hlsInstance.destroy();
          hlsInstance = null;
        }
        
        video.style.display = 'none';
        webFrame.style.display = 'block';
        webFrame.src = '/api/proxy?url=' + encodeURIComponent(currentRawUrl);
      } else {
        showToast("Playback failed. Video format unsupported by this TV browser.");
      }
    };

    function getYouTubeId(url) {
      if (!url) return null;
      var regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
      var match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    function getVimeoId(url) {
      if (!url) return null;
      var regExp = /vimeo\.com\/(?:channels\/(?:\w+\/)?|groups\/([^\/]*)\/videos\/|album\/(\d+)\/video\/|video\/|)(\d+)(?:$|\/|\?)/;
      var match = url.match(regExp);
      return match ? match[3] : null;
    }

    function cleanupPlayers() {
      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
      }
      try {
        video.pause();
      } catch (e) {}
      video.src = '';
    }

    function playMedia(url) {
      playMediaWithConfig(url, false);
    }

    function playMediaWithConfig(url, useProxy) {
      currentRawUrl = url;
      isProxyActive = useProxy;

      // Extract YouTube / Vimeo IDs
      var ytId = getYouTubeId(url);
      var vimId = getVimeoId(url);

      if (ytId) {
        showToast('Playing YouTube Video...');
        cleanupPlayers();
        video.style.display = 'none';
        webFrame.style.display = 'block';
        idleScreen.style.display = 'none';
        webFrame.src = 'https://www.youtube.com/embed/' + ytId + '?autoplay=1&enablejsapi=1';
        return;
      }

      if (vimId) {
        showToast('Playing Vimeo Video...');
        cleanupPlayers();
        video.style.display = 'none';
        webFrame.style.display = 'block';
        idleScreen.style.display = 'none';
        webFrame.src = 'https://player.vimeo.com/video/' + vimId + '?autoplay=1&api=1';
        return;
      }

      showToast(useProxy ? 'Loading via proxy...' : 'New media received! Loading...');
      
      var finalUrl = url;
      if (useProxy && url.indexOf('http') === 0) {
        finalUrl = '/api/proxy?url=' + encodeURIComponent(url);
      }

      console.log('Playing media source (useProxy=' + useProxy + '):', finalUrl);

      cleanupPlayers();

      // Reset widgets for standard video playback
      webFrame.style.display = 'none';
      webFrame.src = 'about:blank';
      video.style.display = 'block';
      idleScreen.style.display = 'none';

      // Check if URL is HLS stream
      var isHLS = url.toLowerCase().indexOf('.m3u8') !== -1;

      if (isHLS) {
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          // Native HLS support (Safari / Smart TVs / Apple TV / webOS / Tizen)
          video.src = finalUrl;
          video.load();
          var playPromise = video.play();
          if (playPromise !== undefined) {
            playPromise.then(function() { showToast('Playing stream'); }).catch(handlePlayBlock);
          }
        } else if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          // Standard browser fallback using hls.js with buffering optimization for slow networks
          var hlsConfig = {
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
            maxBufferSize: 50 * 1000 * 1000,
            maxBufferHole: 0.5,
            nudgeMaxRetries: 10,
            nudgeDelay: 100,
            lowLatencyMode: false
          };
          hlsInstance = new Hls(hlsConfig);
          hlsInstance.loadSource(finalUrl);
          hlsInstance.attachMedia(video);
          hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
            var playPromise = video.play();
            if (playPromise !== undefined) {
              playPromise.then(function() { showToast('Playing stream'); }).catch(handlePlayBlock);
            }
          });
        } else {
          // Direct fallback if no engines supported
          video.src = finalUrl;
          video.load();
          var playPromise = video.play();
          if (playPromise !== undefined) {
            playPromise.then(function() { showToast('Playing stream'); }).catch(handlePlayBlock);
          }
        }
      } else {
        // Standard video file (mp4, webm, etc.)
        video.src = finalUrl;
        video.load();
        var playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise.then(function() { showToast('Playing stream'); }).catch(handlePlayBlock);
        }
      }
    }

    function handlePlayBlock(error) {
      showToast('Autoplay blocked. Tap screen to play with audio.');
      console.log("Playback interaction required: ", error);
    }

    // Try unmuting automatically once play succeeds
    video.onplaying = function() {
      // Small timeout to satisfy browser play triggers
      setTimeout(function() {
        video.muted = false;
      }, 300);
    };

    // Auto play next video in queue when current video ends
    video.onended = function() {
      console.log("Video finished. Transitioning to next queued item...");
      skipToNext();
    };

    // Interactive fallback for older TVs that require user gesture to trigger video play
    document.body.addEventListener('click', function(e) {
      // Don't trigger play/unmute if clicking inside the sidebar menu
      if (sidebar.contains(e.target) || document.getElementById('menu-btn').contains(e.target)) {
        return;
      }
      if (video.src) {
        video.muted = false;
        video.play();
        showToast('Playback started with audio');
      }
    });

    // Listen to iframe postMessage events (e.g. YouTube and Vimeo state changes)
    window.addEventListener('message', function(event) {
      try {
        var data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        if (data) {
          // YouTube autoplay check / end state
          if (data.event === 'onStateChange' && data.info === 0) {
            console.log("YouTube video ended. Transitioning to next queued item...");
            skipToNext();
          }
          // Vimeo finish state
          if (data.event === 'ended' || data.event === 'finish') {
            console.log("Vimeo video ended. Transitioning to next queued item...");
            skipToNext();
          }
        }
      } catch (err) {
        // Ignore non-JSON postMessage payloads
      }
    });

    function handleIframeVideo(targetVideo, iframeDoc) {
      try {
        var src = targetVideo.currentSrc || targetVideo.src;
        if (!src) {
          var sources = targetVideo.getElementsByTagName('source');
          if (sources.length > 0) {
            src = sources[0].src;
          }
        }

        console.log("Detected video tag inside iframe. Source:", src);

        if (src && src.indexOf('blob:') !== 0 && src.indexOf('http') === 0) {
          console.log("Direct video URL extracted. Redirecting to native player:", src);
          showToast("Video extracted! Playing in hardware player...");
          webFrame.src = 'about:blank'; // Clear iframe to prevent loops
          playMediaWithConfig(src, false);
          return;
        }

        // Fallback: Maximize video inside iframe viewport
        console.log("Video source is blob or MSE. Maximizing inside iframe...");
        showToast("Maximizing page video in full screen...");
        
        var style = iframeDoc.getElementById('tv-cast-maximize-style');
        if (!style) {
          style = iframeDoc.createElement('style');
          style.id = 'tv-cast-maximize-style';
          style.textContent = 'html, body { overflow: hidden !important; background: #000 !important; width: 100% !important; height: 100% !important; margin: 0 !important; padding: 0 !important; }\n' +
                              'video { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 99999999 !important; background: #000 !important; }';
          iframeDoc.head.appendChild(style);
        }

        var parent = targetVideo.parentElement;
        while (parent && parent !== iframeDoc.body) {
          parent.style.position = 'static';
          parent.style.overflow = 'visible';
          parent.style.width = '100%';
          parent.style.height = '100%';
          parent = parent.parentElement;
        }

        try {
          targetVideo.play();
          targetVideo.muted = false;
        } catch (e) {
          console.warn("Autoplay block inside iframe: ", e);
        }

        targetVideo.onended = function() {
          console.log("Iframe video ended. Skipping to next...");
          skipToNext();
        };
      } catch (err) {
        console.error("Error handling iframe video: ", err);
      }
    }

    // Scan proxied iframe pages for HTML5 video elements to extract or maximize
    webFrame.onload = function() {
      try {
        var iframeDoc = webFrame.contentDocument || webFrame.contentWindow.document;
        if (!iframeDoc) return;

        var currentHref = webFrame.contentWindow.location.href;
        if (currentHref === 'about:blank' || webFrame.src === 'about:blank') {
          return;
        }

        console.log("Iframe loaded page: " + currentHref + ". Scanning for videos...");

        // 1. Scan immediately
        var videos = iframeDoc.getElementsByTagName('video');
        if (videos.length > 0) {
          handleIframeVideo(videos[0], iframeDoc);
          return;
        }

        // 2. Scan periodically for 10 seconds to catch dynamically loaded videos
        var scanAttempts = 0;
        var scanInterval = setInterval(function() {
          scanAttempts++;
          if (scanAttempts > 20) {
            clearInterval(scanInterval);
            return;
          }
          try {
            var doc = webFrame.contentDocument || webFrame.contentWindow.document;
            if (!doc || webFrame.src === 'about:blank') {
              clearInterval(scanInterval);
              return;
            }
            var vids = doc.getElementsByTagName('video');
            if (vids.length > 0) {
              clearInterval(scanInterval);
              handleIframeVideo(vids[0], doc);
            }
          } catch (err) {
            clearInterval(scanInterval);
          }
        }, 500);

      } catch (err) {
        console.warn("Cannot access iframe DOM (CORS/Origins): ", err);
      }
    };

    // Run poll every 2 seconds
    setInterval(checkState, 2000);
    
    // Initial check
    checkState();
  </script>
</body>
</html>
